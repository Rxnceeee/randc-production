<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | RandC</title>
  <meta name="description" content="The page you're looking for doesn't exist.">
  <link rel="icon" type="image/png" sizes="32x32" href="../images/randclogo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    :root {
      --primary:       #16a34a;
      --primary-dark:  #15803d;
      --primary-light: rgba(22, 163, 74, 0.10);
      --primary-glow:  rgba(22, 163, 74, 0.18);

      --bg-base:       #f9fafb;
      --bg-surface:    #ffffff;

      --text-primary:  #0a0a0a;
      --text-secondary:#374151;
      --text-muted:    #6b7280;

      --border:        #e5e7eb;

      --shadow-sm:     0 1px 4px rgba(0, 0, 0, 0.07);
      --shadow-md:     0 4px 16px rgba(0, 0, 0, 0.09);
      --shadow-lg:     0 12px 36px rgba(0, 0, 0, 0.11);

      --radius-sm:     6px;
      --radius-md:     10px;
      --radius-lg:     14px;
      --radius-xl:     20px;

      --transition:    all .2s cubic-bezier(.4, 0, .2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; height: 100%; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    a { color: var(--primary); text-decoration: none; }

    /* ── Background decoration ── */
    .bg-deco {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; overflow: hidden;
    }
    .bg-deco::before {
      content: '';
      position: absolute;
      top: -20%; left: -10%;
      width: 60vw; height: 60vw;
      background: radial-gradient(circle, rgba(22, 163, 74, 0.06) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulse-slow 8s ease-in-out infinite alternate;
    }
    .bg-deco::after {
      content: '';
      position: absolute;
      bottom: -10%; right: -10%;
      width: 50vw; height: 50vw;
      background: radial-gradient(circle, rgba(22, 163, 74, 0.04) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulse-slow 10s ease-in-out infinite alternate-reverse;
    }
    @keyframes pulse-slow {
      from { transform: scale(1);    opacity: .7; }
      to   { transform: scale(1.15); opacity: 1;  }
    }

    /* ── Grid pattern overlay ── */
    .grid-pattern {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: .3;
    }

    /* ── Top bar ── */
    .top-bar {
      position: relative; z-index: 10;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: .9rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: var(--shadow-sm);
    }
    .brand {
      font-size: 1.1rem; font-weight: 800; letter-spacing: -.02em;
      color: var(--primary);
      display: flex; align-items: center; gap: .4rem;
    }
    .brand i { font-size: 1.1rem; color: var(--primary); }

    /* ── Main content ── */
    main {
      flex: 1;
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 3rem 1.5rem;
      text-align: center;
    }

    /* ── 404 giant number ── */
    .error-number {
      font-size: clamp(6rem, 20vw, 14rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -.04em;
      color: var(--primary);
      position: relative;
      animation: fade-down .6s ease both;
      filter: drop-shadow(0 8px 24px rgba(22, 163, 74, 0.18));
    }
    .error-number::after {
      content: '404';
      position: absolute; inset: 0;
      color: var(--primary);
      filter: blur(28px) opacity(.2);
      z-index: -1;
    }

    /* ── Illustration card ── */
    .error-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 2.5rem 2.5rem 2rem;
      max-width: 520px; width: 100%;
      box-shadow: var(--shadow-lg);
      animation: fade-up .5s ease .15s both;
      position: relative; overflow: hidden;
    }
    .error-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--primary);
    }

    .error-icon-wrap {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--primary-light);
      border: 1px solid rgba(22, 163, 74, 0.2);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem; color: var(--primary);
      animation: bounce-in .6s cubic-bezier(.34, 1.56, .64, 1) .3s both;
    }

    .error-card h1 {
      font-size: 1.5rem; font-weight: 700; letter-spacing: -.02em;
      color: var(--text-primary); margin-bottom: .5rem;
    }
    .error-card p {
      font-size: .9rem; color: var(--text-muted); line-height: 1.7;
      margin-bottom: 1.75rem;
    }

    /* ── Action buttons ── */
    .btn-group {
      display: flex; flex-direction: column; gap: .65rem;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: .45rem;
      padding: .7rem 1.4rem; border-radius: var(--radius-md);
      font-family: 'Poppins', sans-serif;
      font-size: .85rem; font-weight: 600;
      transition: var(--transition); cursor: pointer;
      text-decoration: none; border: none; outline: none;
    }
    .btn-primary {
      background: var(--primary);
      color: #ffffff;
      box-shadow: 0 4px 14px rgba(22, 163, 74, 0.25);
    }
    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(22, 163, 74, 0.35);
      color: #ffffff;
    }
    .btn-secondary {
      background: var(--bg-surface);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: var(--primary-light);
      border-color: rgba(22, 163, 74, 0.35);
      color: var(--primary);
    }

    /* ── Quick links row ── */
    .quick-links {
      display: flex; flex-wrap: wrap; justify-content: center; gap: .5rem;
      margin-top: 1.5rem;
      animation: fade-up .5s ease .35s both;
    }
    .quick-link {
      display: inline-flex; align-items: center; gap: .3rem;
      font-size: .75rem; font-weight: 500; color: var(--text-muted);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: .3rem .75rem;
      transition: var(--transition);
      text-decoration: none;
    }
    .quick-link:hover {
      color: var(--primary);
      border-color: rgba(22, 163, 74, 0.35);
      background: var(--primary-light);
    }
    .quick-link i { font-size: .8rem; }

    /* ── Footer ── */
    footer {
      position: relative; z-index: 1;
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      padding: 1.25rem 2rem;
    }
    .footer-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: .75rem;
    }
    .footer-copy { font-size: .75rem; color: var(--text-muted); }
    .footer-links { display: flex; gap: 1.25rem; flex-wrap: wrap; }
    .footer-links a { font-size: .75rem; color: var(--text-muted); transition: var(--transition); }
    .footer-links a:hover { color: var(--primary); }

    /* ── Keyframes ── */
    @keyframes fade-down {
      from { opacity: 0; transform: translateY(-24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounce-in {
      from { opacity: 0; transform: scale(.5); }
      to   { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 480px) {
      .top-bar { padding: .75rem 1rem; }
      .error-card { padding: 1.75rem 1.25rem 1.5rem; }
      footer .footer-inner { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <div class="bg-deco" aria-hidden="true"></div>
  <div class="grid-pattern" aria-hidden="true"></div>

  <!-- Main -->
  <main>

    <div class="error-card" role="main">
      <div class="error-icon-wrap" aria-hidden="true">
        <i class="bi bi-compass"></i>
      </div>
      <h1>Page Not Found</h1>
      <p>
        The page you're looking for doesn't exist or may have been moved.
        Double-check the URL, or use one of the options below to find your way back.
      </p>
      <div class="btn-group">
        
        <a href="javascript:history.back()" class="btn btn-secondary">
          <i class="bi bi-arrow-left"></i> Go Back
        </a>
      </div>
    </div>

  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-inner">
      <p class="footer-copy">
        &copy; <span id="yr"></span> RandC Document Processing. All rights reserved.
      </p>
      <nav class="footer-links" aria-label="Footer navigation">
        <a href="../pages/legal.html#pp-collect">Privacy Policy</a>
        <a href="../pages/legal.html#tos-acceptance">Terms of Service</a>
        <a href="../pages/legal.html#pp-dpa">Data Privacy Act</a>
        <a href="../pages/index.html#services">Services</a>
        <a href="../pages/index.html#faq">FAQ</a>
      </nav>
    </div>
  </footer>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();
  </script>
</body>
</html>
